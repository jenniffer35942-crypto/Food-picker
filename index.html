<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>食物夾娃娃機 🍽️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #fff5f7, #ffe3e8);
  padding-top: 40px;
}

h1 {
  color: #ff4d6d;
}

.machine {
  width: 260px;
  height: 260px;
  margin: 30px auto;
  border: 4px solid #ff4d6d;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  background: white;
}

.claw {
  width: 40px;
  height: 40px;
  background: #ccc;
  border-radius: 10px;
  position: absolute;
  top: 20px;
  left: 110px;
  transition: 0.4s;
}

.food {
  position: absolute;
  bottom: 20px;
  width: 100%;
  font-size: 14px;
  color: #555;
}

button {
  padding: 14px 26px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: #ff758f;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #ff4d6d;
  transform: scale(1.05);
}

#result {
  margin-top: 25px;
  font-size: 24px;
  min-height: 40px;
}
</style>
</head>

<body>

<h1>食物夾娃娃機 🧸🍽️</h1>
<p>夾到什麼就吃什麼 😏</p>

<div class="machine">
  <div class="claw" id="claw"></div>
  <div class="food">🎁 食物池在這裡</div>
</div>

<button onclick="play()">夾一次</button>

<h2 id="result">準備夾...</h2>

<script>
let foods = [
  "螺絲粉（不要辣）",
  "麥當勞（麥旋風要吃）",
  "啃樂叔（沒吃過的不知道好不好吃）",
  "塔斯丁（還好但加減吃）",
  "牛肉麵（別捨不得吃你的同伴）",
  "餛飩麵",
  "水餃＋酸辣湯",
  "鍋貼＋肉夾饃＋紫菜蛋花湯",
  "涼皮（怕你太冰涼涼）",
  "炒飯＋牛肉丸湯",
  "番茄雞蛋麵",
  "小籠包＋豆漿",
  "蟹黃拌麵",
  "蒸餃",
  "出去吃火鍋",
  "壽司＋味噌湯",
  "牛丼飯（外送50分鐘）",
  "嘎嘎香肉醬麵"
];

const originalFoods = [...foods];

function play() {
  const claw = document.getElementById("claw");
  const result = document.getElementById("result");

  if (foods.length === 0) {
    result.innerText = "全部被夾完了 🔁 重置中...";
    setTimeout(() => {
      foods = [...originalFoods];
      result.innerText = "重新補貨完成 🍽️";
    }, 1000);
    return;
  }

  result.innerText = "夾取中... 🧸";

  // 模擬夾子移動
  claw.style.top = "140px";

  setTimeout(() => {
    const i = Math.floor(Math.random() * foods.length);
    const chosen = foods[i];
    foods.splice(i, 1);

    claw.style.top = "20px";
    result.innerText = "夾到 👉 " + chosen;
  }, 700);
}
</script>

</body>
</html>

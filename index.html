<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>食物夾娃娃機 🍽️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff5f7, #ffe3e8);
  font-family: Arial;
}

h1 {
  color: #ff4d6d;
  margin-bottom: 10px;
}

.machine {
  width: 320px;
  height: 320px;
  border: 5px solid #ff4d6d;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.claw {
  width: 40px;
  height: 40px;
  background: #ccc;
  border-radius: 10px;
  position: absolute;
  top: 20px;
  left: 140px;
  transition: 0.4s;
}

.items {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 26px;
}

button {
  margin-top: 20px;
  padding: 14px 26px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: #ff758f;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff4d6d;
}

#result {
  margin-top: 20px;
  font-size: 22px;
  min-height: 30px;
}
</style>
</head>

<body>

<h1>食物夾娃娃機 🍽️🧸</h1>

<div class="machine">
  <div class="claw" id="claw"></div>

  <div class="items">
    🍜 🍔 🥟 🍱 🍗 🍝 🥤 🍙
  </div>
</div>

<button onclick="play()">夾一次</button>

<h2 id="result">準備夾...</h2>

<script>
let foods = [
  "螺絲粉（不要辣）",
  "麥當勞（麥旋風要吃）",
  "啃樂叔（沒吃過的不知道好不好吃）",
  "塔斯丁（還好但加減吃）",
  "牛肉麵（別捨不得吃你的同伴）",
  "餛飩麵",
  "水餃＋酸辣湯",
  "鍋貼＋肉夾饃＋紫菜蛋花湯",
  "涼皮（怕你太冰涼涼）",
  "炒飯＋牛肉丸湯",
  "番茄雞蛋麵",
  "小籠包＋豆漿",
  "蟹黃拌麵",
  "蒸餃",
  "出去吃火鍋",
  "壽司＋味噌湯",
  "牛丼飯（外送50分鐘）",
  "嘎嘎香肉醬麵"
];

const originalFoods = [...foods];

function play() {
  const claw = document.getElementById("claw");
  const result = document.getElementById("result");

  if (foods.length === 0) {
    result.innerText = "補貨中 🍽️";
    foods = [...originalFoods];
    return;
  }

  result.innerText = "夾取中... 🧸";

  // 模擬夾子移動
  claw.style.top = "160px";

  setTimeout(() => {
    const i = Math.floor(Math.random() * foods.length);
    const chosen = foods[i];
    foods.splice(i, 1);

    claw.style.top = "20px";
    result.innerText = "夾到 👉 " + chosen;
  }, 700);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什麼 🍽️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: "Inter", Arial;
  background: linear-gradient(135deg, #fff1f4, #ffe3e8);

  display: flex;
  justify-content: center;
  align-items: center;

  /* 防止手機縮放字體 */
  -webkit-text-size-adjust: 100%;
}

/* 🔥 手機滿版核心 */
.card {
  width: 94vw;
  height: 92vh;

  border-radius: 28px;

  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(16px);

  box-shadow: 0 20px 60px rgba(255, 77, 109, 0.18);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  padding: 20px;
  box-sizing: border-box;
}

/* 🔥 標題更大（手機友善） */
h1 {
  margin: 0;
  font-size: clamp(32px, 7vw, 44px);
  color: #ff3d68;
  font-weight: 700;
  text-align: center;
}

p {
  color: #777;
  margin-top: 10px;
  margin-bottom: 25px;
  font-size: clamp(14px, 4vw, 16px);
}

/* 🔥 按鈕更大更好點 */
button {
  padding: 16px 30px;
  font-size: clamp(16px, 4.5vw, 20px);
  font-weight: 700;

  border: none;
  border-radius: 999px;

  background: linear-gradient(135deg, #ff6b8b, #ff3d68);
  color: white;

  cursor: pointer;
  transition: 0.2s ease;

  box-shadow: 0 12px 25px rgba(255, 61, 104, 0.25);
}

/* 🔥 結果超大重點 */
h2 {
  margin-top: 35px;
  font-size: clamp(26px, 7vw, 40px);
  color: #333;

  min-height: 120px;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;
  line-height: 1.4;

  padding: 0 10px;
}

/* 小字提示 */
.hint {
  font-size: 12px;
  color: #aaa;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">
  <h1>今天吃什麼 🍽️</h1>
  <p>世界上最餓的老鼠就是餓鼠</p>

  <button onclick="pick()">幫你選一個</button>

  <h2 id="result">👆🏻👆🏻👆🏻👆🏻👆🏻👆🏻</h2>
  <div class="hint"></div>
</div>

<script>
let foods = [
    "螺絲粉（我想吃 幫我吃）",
  "麥當勞（不要太常吃但麥旋風要吃）",
  "啃樂叔（沒吃過的不知道好不好吃）",
  "塔斯丁（還好但轉到就加減吃好嗎）",

  "牛肉麵（別捨不得吃你的同伴）",
  "餛飩麵",

  "水餃＋酸辣湯",
  "鍋貼＋肉夾饃＋紫菜蛋花湯",
  "涼皮（感覺有點酷哦但怕你太冰涼涼）",
  "炒飯＋牛肉丸湯",
  "傳奇冒菜（麻辣燙）可以選不辣燙噢幫你看過了",
  "很多烤串串",
  "義大利麵＋蘑菇濃湯",
  "學我煮一些健康又沒味道的東西",
  "這不是肯德🐣",
  "酸菜魚（你家附近有！！）",
  "小籠包＋豆漿（老上海餛飩舖看起來有點好吃）",
  "蟹黃拌麵（老上海餛飩舖裡面有）",
  "韓式拌飯",
  "蒸餃",
  "出去吃火鍋嗎 好懶哦 不要好了",
  "壽司＋味噌湯（因為你變成獵豹就喝不到了 趁你現在是牛趕快喝）",

  "牛丼飯（但要外送50分鐘哭哭 很餓請跳下一個）",

  "嘎嘎香肉醬麵（看起來很好吃但感覺很鹹 一定愛配溫開水）"
];

const originalFoods = [...foods];

function pick() {
  const result = document.getElementById("result");

  if (foods.length === 0) {
    result.innerText = "重置中...";
    setTimeout(() => {
      foods = [...originalFoods];
      result.innerText = "重新開始 🍽️";
    }, 800);
    return;
  }

  result.innerText = "選擇中 🤔";

  setTimeout(() => {
    const i = Math.floor(Math.random() * foods.length);
    result.innerText = foods[i];
    foods.splice(i, 1);
  }, 500);
}
</script>

</body>
</html>

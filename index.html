<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日吃什麼抽獎機 🎰</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background: linear-gradient(135deg, #fff5f7, #ffe3e8);
  text-align: center;
}

h1 {
  color: #ff4d6d;
}

.slot {
  width: 90vw;
  max-width: 400px;
  height: 180px;
  border: 6px solid #ff4d6d;
  border-radius: 20px;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

button {
  margin-top: 20px;
  padding: 14px 26px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: #ff758f;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff4d6d;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  min-height: 40px;
}
</style>
</head>

<body>

<h1>🎰 今日吃什麼抽獎機</h1>

<div class="slot" id="slot">按下開始抽獎 🍽️</div>

<button onclick="draw()">開始抽獎</button>

<h2 id="result"></h2>

<script>
let foods = [
  "螺絲粉（不要辣）",
  "麥當勞（麥旋風要吃）",
  "啃樂叔",
  "塔斯丁",
  "牛肉麵（別捨不得吃同伴）",
  "餛飩麵",
  "水餃＋酸辣湯",
  "鍋貼＋肉夾饃＋紫菜蛋花湯",
  "涼皮（怕你太冰涼涼）",
  "炒飯＋牛肉丸湯",
  "番茄雞蛋麵",
  "小籠包＋豆漿",
  "蟹黃拌麵",
  "蒸餃",
  "火鍋",
  "壽司＋味噌湯",
  "牛丼飯",
  "嘎嘎香肉醬麵"
];

const original = [...foods];

function draw() {
  const slot = document.getElementById("slot");
  const result = document.getElementById("result");

  if (foods.length === 0) {
    foods = [...original];
  }

  let count = 0;

  let interval = setInterval(() => {
    const random = foods[Math.floor(Math.random() * foods.length)];
    slot.innerText = random;
    count++;

    if (count > 10) {
      clearInterval(interval);

      const final = foods[Math.floor(Math.random() * foods.length)];
      slot.innerText = final;
      result.innerText = "🎉 就是這個！";
    }
  }, 100);
}
</script>

</body>
</html>

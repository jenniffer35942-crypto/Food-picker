<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什麼 🍽️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #fff5f7, #ffe3e8);
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

button {
  padding: 14px 24px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #ff758f;
  color: white;
}

#result {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>今天吃什麼 🍽️</h1>

<button onclick="pick()">幫你選一個</button>

<h2 id="result">點我抽選</h2>

<script>
const foods = [
  "螺絲粉（不要辣）",
  "麥當勞（不要太常吃但麥旋風要吃）",
  "啃樂叔（沒吃過的不知道好不好吃）",
  "塔斯丁（還好但轉到就加減吃好嗎）",

  "牛肉麵（別捨不得吃你的同伴）",
  "餛飩麵",

  "水餃＋酸辣湯",
  "鍋貼＋肉夾饃＋紫菜蛋花湯",
  "涼皮（感覺有點酷哦但怕你太冰涼涼）",
  "炒飯＋牛肉丸湯",

  "番茄雞蛋麵",

  "自己煮",
  "肯德基",

  "小籠包＋豆漿（老上海餛飩舖看起來有點好吃）",
  "蟹黃拌麵（老上海餛飩舖裡面有）",

  "蒸餃",
  "出去吃火鍋",
  "壽司＋味噌湯（因為你變成獵豹就喝不到了 趁你現在是牛趕快喝）",

  "牛丼飯（但要外送50分鐘哭哭 很餓請跳下一個）",

  "嘎嘎香肉醬麵（看起來很好吃但感覺很鹹 一定愛配溫開水）"
];

function pick() {
  const i = Math.floor(Math.random() * foods.length);
  document.getElementById("result").innerText = foods[i];
}
</script>

</body>
</html>
